<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: transparent;
      color: var(--text-color, #31333f);
      overflow: hidden;
    }

    .label {
      display: block;
      margin: 0 0 0.35rem;
      font-family: "Segoe UI", sans-serif;
      font-size: 0.875rem;
      line-height: 1.25rem;
      font-weight: 400;
    }

    .picker {
      width: 100%;
    }

    .trigger {
      align-items: center;
      background: var(--secondary-background-color, #f0f2f6);
      border: 1px solid color-mix(in srgb, var(--text-color, #31333f) 18%, transparent);
      border-radius: 0.5rem;
      color: var(--text-color, #31333f);
      cursor: pointer;
      display: flex;
      font-size: 1rem;
      justify-content: space-between;
      min-height: 2.5rem;
      padding: 0.45rem 0.75rem;
      text-align: left;
      width: 100%;
    }

    .trigger:hover,
    .trigger:focus-visible {
      border-color: var(--primary-color, #ff4b4b);
      outline: none;
    }

    .arrow {
      font-family: "Segoe UI Symbol", sans-serif;
      font-size: 0.75rem;
      margin-left: 0.75rem;
    }

    .menu {
      background: var(--secondary-background-color, #ffffff);
      border: 1px solid color-mix(in srgb, var(--text-color, #31333f) 18%, transparent);
      border-radius: 0.5rem;
      box-shadow: 0 0.25rem 0.9rem rgb(0 0 0 / 16%);
      display: none;
      margin-top: 0.35rem;
      max-height: 20rem;
      overflow-y: auto;
      padding: 0.25rem;
      width: 100%;
    }

    .menu.open {
      display: block;
    }

    .option {
      align-items: baseline;
      background: transparent;
      border: 0;
      border-radius: 0.35rem;
      color: var(--text-color, #31333f);
      cursor: pointer;
      display: flex;
      font-size: 1rem;
      justify-content: space-between;
      min-height: 2.25rem;
      padding: 0.4rem 0.55rem;
      text-align: left;
      width: 100%;
    }

    .option:hover,
    .option:focus-visible,
    .option.selected {
      background: color-mix(in srgb, var(--primary-color, #ff4b4b) 14%, transparent);
      outline: none;
    }

    .sample {
      margin-left: 0.75rem;
      opacity: 0.72;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <label class="label" id="label"></label>
  <div class="picker">
    <button class="trigger" id="trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
      <span id="selected"></span>
      <span class="arrow">▼</span>
    </button>
    <div class="menu" id="menu" role="listbox"></div>
  </div>

  <script>
    const state = {
      args: null,
      open: false,
      value: "",
      lastIncomingValue: null,
    };

    function sendMessage(type, data = {}) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type,
        ...data,
      }, "*");
    }

    function setFrameHeight() {
      sendMessage("streamlit:setFrameHeight", {
        height: state.open ? 430 : 72,
      });
    }

    function setComponentValue(value) {
      sendMessage("streamlit:setComponentValue", {value});
    }

    function applyTheme(theme) {
      if (!theme) return;
      const root = document.documentElement;
      root.style.setProperty("--primary-color", theme.primaryColor);
      root.style.setProperty("--background-color", theme.backgroundColor);
      root.style.setProperty("--secondary-background-color", theme.secondaryBackgroundColor);
      root.style.setProperty("--text-color", theme.textColor);
      root.style.colorScheme = theme.base === "dark" ? "dark" : "light";
    }

    function displayName(value) {
      return value || state.args.theme_default_label;
    }

    function fontStyle(value) {
      return value ? `"${value.replaceAll('"', '')}"` : "inherit";
    }

    function closeMenu() {
      state.open = false;
      document.getElementById("menu").classList.remove("open");
      document.getElementById("trigger").setAttribute("aria-expanded", "false");
      setFrameHeight();
    }

    function selectValue(value) {
      state.value = value;
      setComponentValue(value);
      render();
      closeMenu();
    }

    function createOption(value) {
      const option = document.createElement("button");
      option.type = "button";
      option.className = "option";
      option.setAttribute("role", "option");
      option.setAttribute("aria-selected", value === state.value ? "true" : "false");
      option.style.fontFamily = fontStyle(value);

      if (value === state.value) {
        option.classList.add("selected");
      }

      const name = document.createElement("span");
      name.textContent = displayName(value);
      option.appendChild(name);

      const sample = document.createElement("span");
      sample.className = "sample";
      sample.textContent = "Aa 123";
      option.appendChild(sample);
      option.addEventListener("click", () => selectValue(value));
      return option;
    }

    function render() {
      if (!state.args) return;
      document.getElementById("label").textContent = state.args.label;

      const selected = document.getElementById("selected");
      selected.textContent = displayName(state.value);
      selected.style.fontFamily = fontStyle(state.value);

      const menu = document.getElementById("menu");
      menu.replaceChildren();
      menu.appendChild(createOption(""));
      state.args.options.forEach((font) => menu.appendChild(createOption(font)));
      menu.classList.toggle("open", state.open);
      setFrameHeight();
    }

    document.getElementById("trigger").addEventListener("click", () => {
      state.open = !state.open;
      document.getElementById("menu").classList.toggle("open", state.open);
      document.getElementById("trigger").setAttribute("aria-expanded", String(state.open));
      setFrameHeight();
    });

    window.addEventListener("message", (event) => {
      if (event.data.type !== "streamlit:render") return;
      const incomingValue = event.data.args.value || "";

      if (
        state.lastIncomingValue === null
        || (incomingValue !== state.lastIncomingValue && incomingValue !== state.value)
      ) {
        state.value = incomingValue;
      }

      state.lastIncomingValue = incomingValue;
      state.args = event.data.args;
      applyTheme(event.data.theme);
      render();
    });

    sendMessage("streamlit:componentReady", {apiVersion: 1});
    setFrameHeight();
  </script>
</body>
</html>
