<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: light dark; font-family: "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { background: transparent; color: var(--app-text, #31333f); margin: 0; overflow: hidden; }
    button, input, select { font: inherit; }
    .editor { display: grid; gap: .8rem; grid-template-columns: minmax(285px, .82fr) minmax(440px, 1.5fr); }
    .panel { background: color-mix(in srgb, var(--app-secondary, #f0f2f6) 72%, transparent); border: 1px solid color-mix(in srgb, var(--app-text, #31333f) 15%, transparent); border-radius: .65rem; padding: .8rem; }
    .panel-title { font-size: .76rem; font-weight: 700; letter-spacing: .05em; margin: 0 0 .65rem; opacity: .68; text-transform: uppercase; }
    .preview { background: var(--chart-background, #fff); border-radius: .5rem; box-shadow: inset 0 0 0 1px rgb(127 127 127 / 14%); display: grid; gap: .72rem; min-height: 222px; overflow: hidden; padding: 1.15rem .8rem; }
    .preview-row { align-items: center; display: grid; gap: .45rem; grid-template-columns: 1.4rem 4.8rem 1fr; min-height: 38px; }
    .rank, .name-slot { color: var(--chart-muted, #777); font-size: .7rem; }
    .rank { font-weight: 700; opacity: .72; text-align: right; }
    .name-slot { overflow: hidden; text-align: right; text-overflow: ellipsis; white-space: nowrap; }
    .track { height: 34px; position: relative; }
    .track-fill { height: 28px; left: 0; position: absolute; top: 3px; width: 100%; }
    .sample-bar { height: 28px; left: 0; position: absolute; top: 3px; }
    .sample-bar.lollipop { background: none !important; border: 0 !important; box-shadow: none !important; top: 1px; }
    .stem, .dot { display: none; overflow: hidden; position: absolute; }
    .sample-bar.lollipop .stem { display: block; height: 7px; left: 0; top: 12px; width: calc(100% - 14px); }
    .sample-bar.lollipop .dot { border-radius: 50%; display: block; height: 28px; right: 0; top: 1px; width: 28px; }
    .sample-bar.lollipop .left-dot { border-radius: 50%; display: block; height: 28px; left: 0; overflow: hidden; position: absolute; top: 1px; width: 28px; }
    .texture-layer, .shine-layer { inset: 0; pointer-events: none; position: absolute; }
    .texture-layer { background-size: var(--texture-size, 12px 12px); mix-blend-mode: var(--texture-blend, overlay); }
    .shine-layer { background: linear-gradient(105deg, transparent 20%, rgb(255 255 255 / var(--shine-opacity, 0)) 50%, transparent 80%); left: var(--shine-left, 40%); transform: skewX(-16deg); width: var(--shine-width, 12%); }
    .content-name, .content-value { color: var(--chart-muted, #777); font-size: .68rem; pointer-events: none; position: absolute; white-space: nowrap; z-index: 5; }
    .preview-logo { align-items: center; color: #18324a; display: flex; font-size: .66rem; font-weight: 800; height: 20px; justify-content: center; overflow: hidden; position: absolute; top: 7px; width: 20px; z-index: 7; }
    .mode-row, .shape-grid { display: grid; gap: .42rem; }
    .mode-row { grid-template-columns: 1fr 1fr; margin-bottom: .65rem; }
    .shape-grid { grid-template-columns: repeat(4, 1fr); margin-bottom: .72rem; }
    .choice-button { align-items: center; background: var(--app-background, #fff); border: 1px solid color-mix(in srgb, var(--app-text, #31333f) 18%, transparent); border-radius: .48rem; color: var(--app-text, #31333f); cursor: pointer; display: flex; justify-content: center; min-height: 34px; padding: .38rem; }
    .shape-button { flex-direction: column; font-size: .69rem; gap: .35rem; min-height: 59px; }
    .choice-button:hover, .choice-button:focus-visible { border-color: var(--app-primary, #ff4b4b); outline: none; }
    .choice-button.active { background: color-mix(in srgb, var(--app-primary, #ff4b4b) 9%, var(--app-background, #fff)); border-color: var(--app-primary, #ff4b4b); box-shadow: 0 0 0 1px color-mix(in srgb, var(--app-primary, #ff4b4b) 18%, transparent); }
    .shape-icon { background: currentColor; height: 11px; opacity: .72; position: relative; width: 42px; }
    [data-shape="rounded"] .shape-icon { border-radius: 3px; }
    [data-shape="capsule"] .shape-icon { border-radius: 999px; }
    [data-shape="lollipop"] .shape-icon { height: 5px; margin: 3px 0; width: 35px; }
    [data-shape="lollipop"] .shape-icon::after { background: currentColor; border-radius: 50%; content: ""; height: 17px; position: absolute; right: -6px; top: -6px; width: 17px; }
    .simple-grid { display: grid; gap: .55rem; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .control-card { border: 1px solid color-mix(in srgb, var(--app-text, #31333f) 12%, transparent); border-radius: .5rem; min-width: 0; padding: .58rem; }
    .control-heading { align-items: center; display: flex; font-size: .8rem; font-weight: 650; gap: .4rem; margin-bottom: .45rem; }
    input[type="checkbox"] { accent-color: var(--app-primary, #ff4b4b); }
    .tabs { display: flex; gap: .25rem; margin: 0 0 .6rem; overflow-x: auto; padding-bottom: .15rem; }
    .tab { background: transparent; border: 0; border-bottom: 2px solid transparent; color: inherit; cursor: pointer; font-size: .7rem; opacity: .66; padding: .38rem .42rem; white-space: nowrap; }
    .tab.active { border-color: var(--app-primary, #ff4b4b); font-weight: 650; opacity: 1; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .section-grid { display: grid; gap: .55rem .75rem; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .section-grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .field { align-items: center; display: grid; font-size: .7rem; gap: .38rem; grid-template-columns: minmax(76px, auto) 1fr 2.8rem; min-height: 30px; }
    .field.wide { grid-column: 1 / -1; }
    .field select, .field input[type="text"] { background: var(--app-background, #fff); border: 1px solid color-mix(in srgb, var(--app-text, #31333f) 18%, transparent); border-radius: .35rem; color: inherit; min-width: 0; padding: .32rem .4rem; width: 100%; }
    .field output { font-variant-numeric: tabular-nums; opacity: .68; text-align: right; }
    input[type="range"] { accent-color: var(--app-primary, #ff4b4b); min-width: 0; width: 100%; }
    input[type="color"] { background: transparent; border: 0; cursor: pointer; height: 1.55rem; padding: 0; width: 100%; }
    .toggle-field { align-items: center; display: flex; font-size: .72rem; gap: .42rem; min-height: 30px; }
    .note, .hint { font-size: .69rem; opacity: .62; }
    .note { grid-column: 1 / -1; margin: .2rem 0 0; }
    .hint { margin-top: .55rem; text-align: center; }
    .hidden { display: none !important; }
    .disabled { opacity: .42; }
    @media (max-width: 820px) { .editor { grid-template-columns: 1fr; } .section-grid, .section-grid.three, .simple-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="editor">
    <section class="panel">
      <p class="panel-title">Live preview</p>
      <div class="preview" id="preview"></div>
      <div class="hint">Advanced effects are layered independently in the final render.</div>
    </section>
    <section class="panel">
      <div class="mode-row">
        <button class="choice-button" type="button" data-mode="simple">Simple</button>
        <button class="choice-button" type="button" data-mode="advanced">Advanced</button>
      </div>
      <p class="panel-title">Bar shape</p>
      <div class="shape-grid">
        <button class="choice-button shape-button" type="button" data-shape="rectangle"><span class="shape-icon"></span>Rectangle</button>
        <button class="choice-button shape-button" type="button" data-shape="rounded"><span class="shape-icon"></span>Rounded</button>
        <button class="choice-button shape-button" type="button" data-shape="capsule"><span class="shape-icon"></span>Capsule</button>
        <button class="choice-button shape-button" type="button" data-shape="lollipop"><span class="shape-icon"></span>Lollipop</button>
      </div>

      <div id="simple-controls" class="simple-grid">
        <div class="control-card"><label class="control-heading"><input type="checkbox" data-key="bar_gradient_enabled"> Gradient</label><label class="field"><span>Light</span><input type="range" min="0" max=".7" step=".01" data-key="bar_gradient_lighten" data-format="percent"><output></output></label></div>
        <div class="control-card"><label class="control-heading"><input type="checkbox" data-key="bar_border_enabled"> Border</label><label class="field"><span>Color</span><input type="color" data-key="bar_border_color"><output></output></label><label class="field"><span>Width</span><input type="range" min="0" max="8" step=".25" data-key="bar_border_width" data-format="px"><output></output></label></div>
        <div class="control-card"><label class="control-heading"><input type="checkbox" data-key="bar_shadow_enabled"> Projected shadow</label><label class="field"><span>Color</span><input type="color" data-key="bar_shadow_color"><output></output></label><label class="field"><span>Opacity</span><input type="range" min="0" max=".6" step=".01" data-key="bar_shadow_alpha" data-format="percent"><output></output></label><label class="field"><span>X / Y</span><input type="range" min="-20" max="20" step="1" data-key="bar_shadow_offset_x" data-format="px"><output></output></label><label class="field"><span></span><input type="range" min="-20" max="20" step="1" data-key="bar_shadow_offset_y" data-format="px"><output></output></label></div>
        <div class="control-card"><div class="control-heading">Category text</div><label class="field"><span>Alignment</span><select data-key="bar_label_alignment"><option value="auto">Auto</option><option value="left">Left</option><option value="center">Center</option><option value="right">Right</option></select><output></output></label></div>
      </div>

      <div id="advanced-controls" class="hidden">
        <nav class="tabs">
          <button class="tab active" type="button" data-tab="fill">Fill</button>
          <button class="tab" type="button" data-tab="texture">Texture</button>
          <button class="tab" type="button" data-tab="depth">Depth</button>
          <button class="tab" type="button" data-tab="effects">Effects</button>
          <button class="tab" type="button" data-tab="track">Track</button>
          <button class="tab" type="button" data-tab="content">Content</button>
          <button class="tab" type="button" data-tab="frame">Border & shadow</button>
        </nav>

        <div class="tab-panel active" data-panel="fill"><div class="section-grid">
          <label class="field"><span>Fill type</span><select data-key="bar_fill_type"><option value="solid">Solid</option><option value="gradient">Gradient</option><option value="texture">Texture</option></select><output></output></label>
          <label class="field"><span>Direction</span><select data-key="bar_gradient_direction"><option value="horizontal">Horizontal</option><option value="vertical">Vertical</option><option value="diagonal">Diagonal</option></select><output></output></label>
          <label class="field"><span>Color stops</span><select data-key="bar_gradient_color_count"><option value="2">2 colors</option><option value="3">3 colors</option></select><output></output></label>
          <label class="toggle-field"><input type="checkbox" data-key="bar_fill_use_category_color"> Use category colors</label>
          <label class="field"><span>Start</span><input type="color" data-key="bar_fill_color_start"><output></output></label>
          <label class="field"><span>Center</span><input type="color" data-key="bar_fill_color_center"><output></output></label>
          <label class="field"><span>End</span><input type="color" data-key="bar_fill_color_end"><output></output></label>
          <label class="field"><span>Highlight</span><input type="range" min="0" max="1" step=".01" data-key="bar_highlight_position" data-format="percent"><output></output></label>
          <label class="field wide"><span>Edge darkening</span><input type="range" min="0" max="1" step=".01" data-key="bar_edge_darkening" data-format="percent"><output></output></label>
        </div></div>

        <div class="tab-panel" data-panel="texture"><div class="section-grid">
          <label class="toggle-field"><input type="checkbox" data-key="bar_texture_enabled"> Enable texture overlay</label><span></span>
          <label class="field"><span>Preset</span><select data-key="bar_texture_preset"><option value="noise">Noise</option><option value="brushed_metal">Brushed metal</option><option value="grunge">Grunge</option><option value="paper">Paper</option><option value="carbon">Carbon</option><option value="custom_image">Custom image</option></select><output></output></label>
          <label class="field"><span>Blend</span><select data-key="bar_texture_blend_mode"><option value="overlay">Overlay</option><option value="multiply">Multiply</option><option value="screen">Screen</option><option value="soft_light">Soft Light</option></select><output></output></label>
          <label class="field wide" id="custom-image-field"><span>Image path</span><input type="text" data-key="bar_texture_custom_image" placeholder="textures/custom.png"><output></output></label>
          <label class="field"><span>Intensity</span><input type="range" min="0" max="1" step=".01" data-key="bar_texture_intensity" data-format="percent"><output></output></label>
          <label class="field"><span>Scale</span><input type="range" min=".1" max="8" step=".1" data-key="bar_texture_scale" data-format="times"><output></output></label>
          <label class="field wide"><span>Contrast</span><input type="range" min="0" max="3" step=".05" data-key="bar_texture_contrast" data-format="times"><output></output></label>
        </div></div>

        <div class="tab-panel" data-panel="depth"><div class="section-grid">
          <label class="toggle-field"><input type="checkbox" data-key="bar_bevel_enabled"> Bevel</label><span></span>
          <label class="field"><span>Bevel size</span><input type="range" min=".01" max=".5" step=".01" data-key="bar_bevel_size" data-format="percent"><output></output></label>
          <label class="field"><span>Bevel light</span><input type="range" min="0" max="1" step=".01" data-key="bar_bevel_highlight_opacity" data-format="percent"><output></output></label>
          <label class="field"><span>Inner shadow</span><input type="range" min="0" max="1" step=".01" data-key="bar_inner_shadow_opacity" data-format="percent"><output></output></label>
          <label class="field"><span>Shadow size</span><input type="range" min=".01" max=".5" step=".01" data-key="bar_inner_shadow_size" data-format="percent"><output></output></label>
          <label class="field"><span>Top highlight</span><input type="range" min="0" max="1" step=".01" data-key="bar_top_highlight_opacity" data-format="percent"><output></output></label>
          <label class="field"><span>Bottom shade</span><input type="range" min="0" max="1" step=".01" data-key="bar_bottom_shade_opacity" data-format="percent"><output></output></label>
        </div></div>

        <div class="tab-panel" data-panel="effects"><div class="section-grid">
          <label class="toggle-field"><input type="checkbox" data-key="bar_outer_glow_enabled"> Outer glow</label><label class="field"><span>Glow color</span><input type="color" data-key="bar_glow_color"><output></output></label>
          <label class="field"><span>Glow opacity</span><input type="range" min="0" max="1" step=".01" data-key="bar_glow_opacity" data-format="percent"><output></output></label>
          <label class="field"><span>Glow blur</span><input type="range" min="0" max="40" step="1" data-key="bar_glow_blur" data-format="px"><output></output></label>
          <label class="field wide"><span>Inner glow</span><input type="range" min="0" max="1" step=".01" data-key="bar_inner_glow_opacity" data-format="percent"><output></output></label>
          <label class="toggle-field"><input type="checkbox" data-key="bar_shine_enabled"> Shine band</label><span></span>
          <label class="field"><span>Position</span><input type="range" min="0" max="1" step=".01" data-key="bar_shine_position" data-format="percent"><output></output></label>
          <label class="field"><span>Width</span><input type="range" min=".01" max=".8" step=".01" data-key="bar_shine_width" data-format="percent"><output></output></label>
          <label class="field wide"><span>Opacity</span><input type="range" min="0" max="1" step=".01" data-key="bar_shine_opacity" data-format="percent"><output></output></label>
        </div></div>

        <div class="tab-panel" data-panel="track"><div class="section-grid">
          <label class="toggle-field"><input type="checkbox" data-key="bar_track_enabled"> Track / background bar</label><span></span>
          <label class="field"><span>Color</span><input type="color" data-key="bar_track_color"><output></output></label>
          <label class="field"><span>Opacity</span><input type="range" min="0" max="1" step=".01" data-key="bar_track_opacity" data-format="percent"><output></output></label>
        </div></div>

        <div class="tab-panel" data-panel="content"><div class="section-grid">
          <label class="field wide"><span>Icon position</span><select data-key="bar_logo_position"><option value="outside_left">Outside left</option><option value="inside_left">Inside left</option><option value="inside_right">Inside right</option><option value="hidden">Hidden</option></select><output></output></label>
          <label class="field"><span>Icon shape</span><select data-key="bar_logo_shape"><option value="adaptive">Match bar</option><option value="circle">Circle</option><option value="rounded">Rounded</option><option value="square">Square</option></select><output></output></label>
          <label class="field"><span>Inner padding</span><input type="range" min="0" max="20" step=".5" data-key="bar_logo_padding" data-format="px"><output></output></label>
          <label class="toggle-field"><input type="checkbox" data-key="bar_logo_border_enabled"> Icon border</label>
          <label class="field"><span>Border color</span><input type="color" data-key="bar_logo_border_color"><output></output></label>
          <label class="field wide"><span>Border width</span><input type="range" min="0" max="8" step=".25" data-key="bar_logo_border_width" data-format="px"><output></output></label>
          <label class="toggle-field"><input type="checkbox" data-key="bar_logo_background_enabled"> Icon background</label>
          <label class="field"><span>Background</span><input type="color" data-key="bar_logo_background_color"><output></output></label>
          <label class="field wide"><span>Background opacity</span><input type="range" min="0" max="1" step=".01" data-key="bar_logo_background_opacity" data-format="percent"><output></output></label>
          <label class="field"><span>Label</span><select data-key="bar_label_position"><option value="left">Left</option><option value="inside">Inside</option><option value="above">Above</option><option value="outside">Outside end</option></select><output></output></label>
          <label class="field"><span>Label alignment</span><select data-key="bar_label_alignment"><option value="auto">Auto</option><option value="left">Left</option><option value="center">Center</option><option value="right">Right</option></select><output></output></label>
          <label class="field"><span>Value</span><select data-key="bar_value_position"><option value="auto">Auto</option><option value="outside">Outside</option><option value="inside">Inside</option><option value="above">Above</option></select><output></output></label>
          <label class="toggle-field"><input type="checkbox" data-key="bar_value_use_theme_color"> Automatic value color</label>
          <label class="field"><span>Value color</span><input type="color" data-key="bar_value_color"><output></output></label><span></span>
          <label class="toggle-field"><input type="checkbox" data-key="bar_value_border_enabled"> Value outline</label>
          <label class="field"><span>Outline color</span><input type="color" data-key="bar_value_border_color"><output></output></label>
          <label class="field wide"><span>Outline width</span><input type="range" min="0" max="8" step=".25" data-key="bar_value_border_width" data-format="px"><output></output></label>
          <label class="toggle-field"><input type="checkbox" data-key="bar_value_shadow_enabled"> Value shadow</label>
          <label class="field"><span>Shadow color</span><input type="color" data-key="bar_value_shadow_color"><output></output></label>
          <label class="field"><span>Shadow X</span><input type="range" min="-20" max="20" step="1" data-key="bar_value_shadow_offset_x" data-format="px"><output></output></label>
          <label class="field"><span>Shadow Y</span><input type="range" min="-20" max="20" step="1" data-key="bar_value_shadow_offset_y" data-format="px"><output></output></label>
          <p class="note">Value font and size remain synchronized with Element fonts and Text sizes.</p>
        </div></div>

        <div class="tab-panel" data-panel="frame"><div class="section-grid">
          <label class="toggle-field"><input type="checkbox" data-key="bar_border_enabled"> Border</label><label class="field"><span>Color</span><input type="color" data-key="bar_border_color"><output></output></label>
          <label class="field wide"><span>Width</span><input type="range" min="0" max="8" step=".25" data-key="bar_border_width" data-format="px"><output></output></label>
          <label class="toggle-field"><input type="checkbox" data-key="bar_shadow_enabled"> Projected shadow</label><label class="field"><span>Color</span><input type="color" data-key="bar_shadow_color"><output></output></label>
          <label class="field"><span>Opacity</span><input type="range" min="0" max=".8" step=".01" data-key="bar_shadow_alpha" data-format="percent"><output></output></label>
          <label class="field"><span>Offset X</span><input type="range" min="-20" max="20" step="1" data-key="bar_shadow_offset_x" data-format="px"><output></output></label>
          <label class="field wide"><span>Offset Y</span><input type="range" min="-20" max="20" step="1" data-key="bar_shadow_offset_y" data-format="px"><output></output></label>
          <p class="note">This shadow is projected behind the bar. Bevel, inner shadow and glow are independent controls.</p>
        </div></div>
      </div>
    </section>
  </div>

  <script>
    const state = {args: null, settings: null, lastIncoming: null, activeTab: "fill"};
    const previewWidths = [90, 72, 54];
    function sendMessage(type, data = {}) { window.parent.postMessage({isStreamlitMessage: true, type, ...data}, "*"); }
    function setComponentValue(value) { sendMessage("streamlit:setComponentValue", {value}); }
    function setFrameHeight() { sendMessage("streamlit:setFrameHeight", {height: document.documentElement.scrollHeight}); }
    function clone(value) { return JSON.parse(JSON.stringify(value)); }
    function applyTheme(theme = {}) { const root = document.documentElement; root.style.setProperty("--app-primary", theme.primaryColor || "#ff4b4b"); root.style.setProperty("--app-background", theme.backgroundColor || "#fff"); root.style.setProperty("--app-secondary", theme.secondaryBackgroundColor || "#f0f2f6"); root.style.setProperty("--app-text", theme.textColor || "#31333f"); root.style.setProperty("--chart-background", state.args.background_color || "#fff"); }
    function hexToRgb(hex) { const value = Number.parseInt(hex.slice(1), 16); return [(value >> 16) & 255, (value >> 8) & 255, value & 255]; }
    function lighten(hex, amount) { return `rgb(${hexToRgb(hex).map((channel) => Math.round(channel + ((255 - channel) * amount))).join(",")})`; }
    function darken(hex, amount) { return `rgb(${hexToRgb(hex).map((channel) => Math.round(channel * (1 - amount))).join(",")})`; }
    function rgba(hex, alpha) { return `rgba(${hexToRgb(hex).join(",")},${alpha})`; }
    function direction(value) { return {horizontal: "to right", vertical: "to bottom", diagonal: "135deg"}[value] || "to right"; }
    function textureCss(preset) { const patterns = {noise: "radial-gradient(circle at 20% 30%,#fff 0 1px,transparent 1.5px),radial-gradient(circle at 75% 65%,#000 0 1px,transparent 1.5px)", brushed_metal: "repeating-linear-gradient(0deg,#fff0 0 2px,#fff8 3px,#0004 4px,#fff0 6px)", grunge: "radial-gradient(ellipse at 20% 30%,#000 0 8%,transparent 28%),radial-gradient(ellipse at 80% 70%,#fff 0 6%,transparent 24%)", paper: "repeating-linear-gradient(18deg,#fff2 0 1px,#0001 2px,#fff0 5px)", carbon: "linear-gradient(45deg,#0008 25%,transparent 25% 75%,#0008 75%),linear-gradient(45deg,#fff2 25%,transparent 25% 75%,#fff2 75%)", custom_image: state.args.custom_texture_data ? `url(${state.args.custom_texture_data})` : "repeating-linear-gradient(45deg,#fff2 0 4px,#0002 4px 8px)"}; return patterns[preset] || patterns.noise; }
