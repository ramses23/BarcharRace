<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: transparent;
      color: var(--app-text, #31333f);
      overflow: hidden;
    }

    .toolbar {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.55rem;
    }

    .toolbar button {
      background: var(--app-secondary, #f0f2f6);
      border: 1px solid color-mix(in srgb, var(--app-text, #31333f) 18%, transparent);
      border-radius: 0.4rem;
      color: var(--app-text, #31333f);
      cursor: pointer;
      font-family: "Segoe UI", sans-serif;
      min-height: 2rem;
      padding: 0.3rem 0.65rem;
    }

    .toolbar button:hover,
    .toolbar button:focus-visible {
      border-color: var(--app-primary, #ff4b4b);
      outline: none;
    }

    .status {
      font-family: "Segoe UI", sans-serif;
      font-size: 0.82rem;
      margin-left: auto;
      opacity: 0.8;
    }

    .stage-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .stage {
      background: var(--canvas-background, #ffffff);
      border: 1px solid color-mix(in srgb, var(--app-text, #31333f) 22%, transparent);
      box-shadow: 0 0.15rem 0.7rem rgb(0 0 0 / 12%);
      outline: none;
      overflow: hidden;
      position: relative;
      touch-action: none;
      user-select: none;
    }

    .stage::before {
      background-image:
        linear-gradient(to right, color-mix(in srgb, var(--app-text, #31333f) 8%, transparent) 1px, transparent 1px),
        linear-gradient(to bottom, color-mix(in srgb, var(--app-text, #31333f) 8%, transparent) 1px, transparent 1px);
      background-size: 5% 5%;
      content: "";
      inset: 0;
      pointer-events: none;
      position: absolute;
      z-index: 0;
    }

    .safe-area {
      border: 1px dashed color-mix(in srgb, var(--app-primary, #ff4b4b) 48%, transparent);
      inset: 5%;
      pointer-events: none;
      position: absolute;
      z-index: 1;
    }

    .bar-sample {
      border-radius: 1px;
      opacity: 0.22;
      pointer-events: none;
      position: absolute;
      z-index: 1;
    }

    .element {
      border: 1px solid transparent;
      border-radius: 0.2rem;
      cursor: grab;
      line-height: 1.05;
      max-width: 75%;
      padding: 0.1rem 0.2rem;
      position: absolute;
      white-space: nowrap;
      z-index: 3;
    }

    .element:hover {
      border-color: color-mix(in srgb, var(--app-primary, #ff4b4b) 58%, transparent);
    }

    .element.active {
      background: color-mix(in srgb, var(--app-primary, #ff4b4b) 10%, transparent);
      border-color: var(--app-primary, #ff4b4b);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--app-primary, #ff4b4b) 20%, transparent);
    }

    .element.dragging {
      cursor: grabbing;
    }

    .hint {
      font-family: "Segoe UI", sans-serif;
      font-size: 0.78rem;
      margin-top: 0.45rem;
      opacity: 0.7;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button type="button" data-action="left">Align left</button>
    <button type="button" data-action="center">Center X</button>
    <button type="button" data-action="right">Align right</button>
    <button type="button" data-action="reset">Reset preset</button>
    <span class="status" id="status">Select an element</span>
  </div>
  <div class="stage-wrap">
    <div class="stage" id="stage" tabindex="0" aria-label="Visual text layout editor">
      <div class="safe-area"></div>
    </div>
  </div>
  <div class="hint">Drag text directly. Use arrow keys for 1 px adjustments or Shift + arrows for 10 px.</div>

  <script>
    const state = {
      args: null,
      positions: null,
      defaults: null,
      lastIncoming: null,
      active: "title",
      drag: null,
      scale: 1,
    };

    const stage = document.getElementById("stage");

    function sendMessage(type, data = {}) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type,
        ...data,
      }, "*");
    }

    function setComponentValue(value) {
      sendMessage("streamlit:setComponentValue", {value});
    }

    function setFrameHeight() {
      const height = document.documentElement.scrollHeight;
      sendMessage("streamlit:setFrameHeight", {height});
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function clamp(value, minimum, maximum) {
      return Math.min(maximum, Math.max(minimum, value));
    }

    function elementAnchor(name) {
      return name === "date" ? "right" : "left";
    }

    function selectedPosition() {
      return state.positions?.[state.active];
    }

    function updateStatus() {
      const position = selectedPosition();
      const label = state.args?.elements?.[state.active]?.label || state.active;
      document.getElementById("status").textContent = position
        ? `${label}: X ${position.x} · Y ${position.y}`
        : "Select an element";
    }

    function applyTheme() {
      const appTheme = state.args.app_theme || {};
      const chartTheme = state.args.theme || {};
      const root = document.documentElement;
      root.style.setProperty("--app-primary", appTheme.primaryColor || "#ff4b4b");
      root.style.setProperty("--app-secondary", appTheme.secondaryBackgroundColor || "#f0f2f6");
      root.style.setProperty("--app-text", appTheme.textColor || "#31333f");
      root.style.setProperty("--canvas-background", chartTheme.background_color || "#ffffff");
    }

    function stageDimensions() {
      const availableWidth = Math.max(280, document.documentElement.clientWidth - 4);
      const canvasWidth = state.args.canvas_width;
      const canvasHeight = state.args.canvas_height;
      const maxHeight = 520;
      const widthFromHeight = maxHeight * canvasWidth / canvasHeight;
      const width = Math.min(availableWidth, widthFromHeight);
      const height = width * canvasHeight / canvasWidth;
      return {width, height};
    }

    function positionElement(node, name) {
      const position = state.positions[name];
      const definition = state.args.elements[name];
      const x = position.x * state.scale;
      const y = position.y * state.scale;
      const pointPixels = definition.font_size * state.args.dpi / 72;
      node.style.left = `${x}px`;
      node.style.top = `${y}px`;
      node.style.fontFamily = definition.font_family
        ? `"${definition.font_family.replaceAll('"', '')}"`
        : `"${state.args.theme.font_family.replaceAll('"', '')}"`;
      node.style.fontSize = `${Math.max(7, pointPixels * state.scale)}px`;
      node.style.fontWeight = definition.font_weight || "normal";
      node.style.color = definition.color;
      node.style.opacity = definition.opacity ?? 1;
      node.style.transform = elementAnchor(name) === "right"
        ? "translate(-100%, -50%)"
        : "translate(0, -50%)";
      node.classList.toggle("active", name === state.active);
    }

    function createElement(name) {
      const definition = state.args.elements[name];
      const node = document.createElement("div");
      node.className = "element";
      node.dataset.name = name;
      node.textContent = definition.text;
      node.setAttribute("role", "button");
      node.setAttribute("aria-label", `Move ${definition.label}`);
      node.addEventListener("pointerdown", startDrag);
      positionElement(node, name);
      return node;
    }

    function renderBars() {
      const layout = state.args.layout;
      const count = Math.max(3, Math.min(8, layout.bar_count || 6));
      const availableHeight = Math.max(1, state.args.canvas_height - layout.top_margin - layout.bottom_margin);
      const step = availableHeight / count;

      for (let index = 0; index < count; index += 1) {
        const bar = document.createElement("div");
        bar.className = "bar-sample";
        bar.style.left = `${layout.left_margin * state.scale}px`;
        bar.style.top = `${(layout.top_margin + index * step) * state.scale}px`;
        bar.style.width = `${Math.max(20, (state.args.canvas_width - layout.left_margin - layout.right_margin) * (1 - index * 0.07)) * state.scale}px`;
        bar.style.height = `${Math.max(2, layout.bar_height * state.scale)}px`;
        bar.style.background = state.args.theme.bar_color || "#4e79a7";
        stage.appendChild(bar);
      }
    }

    function renderStage() {
      if (!state.args || !state.positions) return;
      const dimensions = stageDimensions();
      state.scale = dimensions.width / state.args.canvas_width;
      stage.style.width = `${dimensions.width}px`;
      stage.style.height = `${dimensions.height}px`;
      stage.replaceChildren();

      const safeArea = document.createElement("div");
      safeArea.className = "safe-area";
      stage.appendChild(safeArea);
      renderBars();

      ["title", "subtitle", "date", "source"].forEach((name) => {
        stage.appendChild(createElement(name));
      });
      updateStatus();
      requestAnimationFrame(setFrameHeight);
    }

    function activeNode() {
      return stage.querySelector(`[data-name="${state.active}"]`);
    }

    function setActive(name) {
      state.active = name;
      stage.querySelectorAll(".element").forEach((node) => {
        node.classList.toggle("active", node.dataset.name === name);
      });
      updateStatus();
    }

    function startDrag(event) {
      const node = event.currentTarget;
      const name = node.dataset.name;
      setActive(name);
      stage.focus();
      node.setPointerCapture(event.pointerId);
      node.classList.add("dragging");
      const rect = stage.getBoundingClientRect();
      const anchorX = state.positions[name].x * state.scale;
      const anchorY = state.positions[name].y * state.scale;
      state.drag = {
        name,
        pointerId: event.pointerId,
        offsetX: anchorX - (event.clientX - rect.left),
        offsetY: anchorY - (event.clientY - rect.top),
      };
      node.addEventListener("pointermove", moveDrag);
      node.addEventListener("pointerup", endDrag, {once: true});
      node.addEventListener("pointercancel", endDrag, {once: true});
      event.preventDefault();
    }

    function moveDrag(event) {
      if (!state.drag || event.pointerId !== state.drag.pointerId) return;
      const rect = stage.getBoundingClientRect();
      const x = (event.clientX - rect.left + state.drag.offsetX) / state.scale;
      const y = (event.clientY - rect.top + state.drag.offsetY) / state.scale;
      const position = state.positions[state.drag.name];
      position.x = Math.round(clamp(x, 0, state.args.canvas_width));
      position.y = Math.round(clamp(y, 0, state.args.canvas_height));
      positionElement(event.currentTarget, state.drag.name);
      updateStatus();
    }

    function endDrag(event) {
      const node = event.currentTarget;
      node.classList.remove("dragging");
      node.removeEventListener("pointermove", moveDrag);
      state.drag = null;
      setComponentValue(clone(state.positions));
    }

    function moveActive(deltaX, deltaY) {
      const position = selectedPosition();
      if (!position) return;
      position.x = Math.round(clamp(position.x + deltaX, 0, state.args.canvas_width));
      position.y = Math.round(clamp(position.y + deltaY, 0, state.args.canvas_height));
      positionElement(activeNode(), state.active);
      updateStatus();
      setComponentValue(clone(state.positions));
    }

    stage.addEventListener("keydown", (event) => {
      const amount = event.shiftKey ? 10 : 1;
      const deltas = {
        ArrowLeft: [-amount, 0],
        ArrowRight: [amount, 0],
        ArrowUp: [0, -amount],
        ArrowDown: [0, amount],
      };
      const delta = deltas[event.key];
      if (!delta) return;
      event.preventDefault();
      moveActive(delta[0], delta[1]);
    });

    document.querySelectorAll("[data-action]").forEach((button) => {
      button.addEventListener("click", () => {
        const action = button.dataset.action;
        const position = selectedPosition();
        if (!position) return;

        if (action === "reset") {
          state.positions = clone(state.defaults);
        } else if (action === "left") {
          position.x = Math.round(state.args.canvas_width * 0.05);
        } else if (action === "center") {
          position.x = Math.round(state.args.canvas_width / 2);
        } else if (action === "right") {
          position.x = Math.round(state.args.canvas_width * 0.95);
        }

        renderStage();
        setComponentValue(clone(state.positions));
      });
    });

    window.addEventListener("resize", renderStage);
    window.addEventListener("message", (event) => {
      if (event.data.type !== "streamlit:render") return;
      const incoming = event.data.args.positions;
      const incomingKey = JSON.stringify(incoming);

      if (
        state.lastIncoming === null
        || (incomingKey !== state.lastIncoming && incomingKey !== JSON.stringify(state.positions))
      ) {
        state.positions = clone(incoming);
      }

      state.lastIncoming = incomingKey;
      state.defaults = clone(event.data.args.preset_positions);
      state.args = {
        ...event.data.args,
        app_theme: event.data.theme || {},
      };
      applyTheme();
      renderStage();
    });

    sendMessage("streamlit:componentReady", {apiVersion: 1});
    setFrameHeight();
  </script>
</body>
</html>
